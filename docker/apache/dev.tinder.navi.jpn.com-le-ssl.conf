<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName tinder.navi.jpn.com
    DocumentRoot /var/www/html/public

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/tinder.navi.jpn.com/fullchain1.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/tinder.navi.jpn.com/privkey1.pem

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
</IfModule>

